services:
  beergam:
    image: beergam
    build:
      context: ..
      dockerfile: Beergam/Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      # This becomes ConnectionStrings:Database in ASP.NET config
      ConnectionStrings__Database: "Server=${DB_HOST};Port=3306;Database=beergam;User=${DB_USER};Password=${DB_PASSWORD};"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: beergam
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: